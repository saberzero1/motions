name: E2E Tests

on:
    push:
        branches: ['main', 'master']
    pull_request:
        branches: ['main', 'master']
    workflow_dispatch:

jobs:
    e2e-tests:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: 'npm'

            - name: Install dependencies
              run: npm install

            - name: Build
              run: npm run build

            - name: Cache Obsidian
              uses: actions/cache@v5
              with:
                  path: .obsidian-cache
                  key: obsidian-cache-${{ runner.os }}-${{ hashFiles('manifest.json') }}

            - name: Setup virtual display
              run: |
                  sudo rm -rf /etc/apt/sources.list.d/*.list
                  echo "set man-db/auto-update false" | sudo debconf-communicate
                  sudo dpkg-reconfigure man-db
                  sudo apt-get update -q
                  sudo apt-get install -q herbstluftwm dzen2 x11-xserver-utils
                  export DISPLAY=:99
                  echo "DISPLAY=$DISPLAY" >> "$GITHUB_ENV"
                  Xvfb $DISPLAY -screen 0 1280x1024x24 +extension GLX -noreset &
                  sleep 1
                  herbstluftwm &
                  sleep 1

            - name: Run E2E tests
              run: npm run test:e2e
              env:
                  WDIO_MAX_INSTANCES: 2
