name: Feature request
description: Suggest a new feature or enhancement
labels: ['enhancement']
body:
    - type: checkboxes
      id: preflight
      attributes:
          label: Pre-submission checklist
          options:
              - label: I have checked [KNOWN_LIMITATIONS.md](https://github.com/saberzero1/motions/blob/main/KNOWN_LIMITATIONS.md) and this is not listed as intentionally unsupported
                required: true
              - label: I have searched the [existing issues](https://github.com/saberzero1/motions/issues) and this has not been requested before
                required: true

    - type: textarea
      id: description
      attributes:
          label: Feature description
          description: What would you like to see added or changed?
      validations:
          required: true

    - type: textarea
      id: use-case
      attributes:
          label: Use case
          description: How would you use this feature? What problem does it solve?
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Have you tried any workarounds? Are there other plugins that provide this?
